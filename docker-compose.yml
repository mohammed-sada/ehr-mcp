services:
  postgres:
    image: postgres:17
    container_name: mimiciv-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # MIMIC-IV CSVs live here (expected: ./mimic-data/hosp/*.csv)
      - ./mimic-data:/data:ro
      # Auto-run schema + load + indexes on first init
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:4
    container_name: mimiciv-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Helpful default; you can still change it in the UI
      ADMINER_DEFAULT_SERVER: postgres


  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: mimiciv-mcp-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3333:3333"
    environment:
      PORT: 3333
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: mimiciv
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-inspector:
    build:
      context: ./mcp-inspector
      dockerfile: Dockerfile
    container_name: mimiciv-mcp-inspector
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      MCP_SERVER_URL: http://mcp-server:3333

volumes:
  pgdata:

