services:
  postgres:
    image: postgres:17
    container_name: mimiciv-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # MIMIC-IV CSVs live here (expected: ./mimic-data/hosp/*.csv)
      - ./mimic-data:/data:ro
      # Auto-run schema + load + indexes on first init
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:4
    container_name: mimiciv-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Helpful default; you can still change it in the UI
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  pgdata:

